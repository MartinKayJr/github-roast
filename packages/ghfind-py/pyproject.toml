[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ghfind"
version = "0.1.0"
description = "Official SDK for ghsphere.com — score any GitHub account 0-100 for value & trustworthiness (deterministic, no LLM), plus roasts, battles, leaderboards, and developer discovery."
readme = "README.md"
requires-python = ">=3.8"
license = "AGPL-3.0-or-later"
authors = [{ name = "ghsphere" }]
keywords = ["github", "developer-score", "trust-score", "contribution", "leaderboard", "agent", "mcp", "ai", "ghfind"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = []

[project.scripts]
ghfind = "ghfind._cli:main"

[project.urls]
Homepage = "https://ghsphere.com"
Documentation = "https://ghsphere.com/openapi.json"
Repository = "https://github.com/MartinKayJr/github-roast"
Issues = "https://github.com/MartinKayJr/github-roast/issues"

[project.optional-dependencies]
dev = ["pytest>=7"]

[tool.hatch.build.targets.wheel]
packages = ["ghfind"]

[tool.hatch.build.targets.sdist]
include = ["ghfind", "README.md"]
